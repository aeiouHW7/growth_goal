services:
  db:
    image: postgres:15-alpine
    container_name: flight-board-db
    environment:
      POSTGRES_USER: flightuser
      POSTGRES_PASSWORD: flightpass
      POSTGRES_DB: flightboard
    ports:
      - "5432:5432"
    volumes:
      - flight-board-data:/var/lib/postgresql/data

volumes:
  flight-board-data:
