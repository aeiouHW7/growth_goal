# ACE (AI Coding Engine) OpenSpec Config
# ---------------------------------------------------------
# 基于原 ai-drive-engine 配置重构，旨在提供更通用、更辩证的变更管理契约。
# ---------------------------------------------------------

schema: spec-driven

# 全局上下文：定义 ACE 的核心运行原则
context: |
  # ACE 引擎通用契约

  ## 核心理念 (ETHOS)
  1. **终端无关**：知识资产（Markdown/YAML）是核心，工具是消耗品。
  2. **知识复利**：代码产出的同时必须产出/更新对应的 10_DOCS。
  3. **辩证思考**：禁止直接编码，必须进行方案对比和自我质疑。

  ## 开发生命周期 (Standard 7-Step)
  explore → plan → propose → apply → review → verify → archive

  ## 变更隔离原则
  - 所有变更必须在 `domains/${active-domain}/openspec/changes/${change-id}/` 目录下进行。
  - `change-id` 格式建议：`YYYYMMDD-brief-description` 或 `001-feature-name`。

  ## 知识库结构 (10_DOCS)
  采用冷热分离原则，保护 AI 上下文质量：
  - `10_DOCS/raw/`: 【冷数据】人类专用的输入区（PRD、原始API文档、报错日志），AI **只读**。
  - `10_DOCS/wiki/`: 【热数据】AI 的结构化大脑（业务规则、架构设计、最佳实践），AI **读写**。AI 在完成任务后，必须将从 raw 提取或项目产生的新经验沉淀至 wiki 中。

# 流程规则：强制嵌入“辩证思考”与“状态管理”
rules:
  general:
    - "状态总线：任何核心任务（propose, apply, review 等）结束后，必须在 `.archive/ai-events.jsonl` 中追加一条状态记录。格式：`{\"timestamp\": \"...\", \"task\": \"...\", \"action\": \"...\", \"status\": \"...\"}`"
    - "防跳步机制：必须按顺序勾选文档中的 Checkbox（`- [x]`）。前置 Checkbox 未打勾时，绝对禁止执行下一步（如：未完成方案对比，禁止开始编码）。"

  proposal:
    - "必须包含‘方案对比’：至少列出方案 A 与方案 B，并说明为何选择当前方案。"
    - "必须包含‘风险评估’：识别潜在的技术债、性能瓶颈或安全风险。"
    - "资产审计：列出本次变更将新增或更新哪些 10_DOCS 文件。"
    - "回滚计划：如果 apply 失败或产生预期外影响，如何快速恢复。"

  tasks:
    - "验证绑定：每个编码 Task 必须对应一个明确的 Verify 场景。"
    - "最小化提交：Task 应拆分为可验证的最小单元。"

  design:
    - "DRY 原则审计：检查是否有现成的 Skill 或 Utils 可以复用。"
    - "文档先行：核心逻辑变更必须先在设计文档中明确，再开始编码。"

# 角色定义：由“工种”转为“能力”
roles:
  - id: ARCHITECT
    description: 负责需求拆解、方案对比及 10_DOCS 结构设计。
  - id: IMPLEMENTER
    description: 负责根据 Proposal 实施编码及单元测试。
  - id: QA_ENGINEER
    description: 负责验证场景设计及最终质量验收。

# 默认文件模板路径 (相对于 Domain 根目录)
templates:
  proposal: openspec/templates/proposal.md
  tasks: openspec/templates/tasks.md
  review: openspec/templates/review-log.md
  verify: openspec/templates/verify-log.md
