services:
  ace-mysql:
    image: mysql:8.0
    container_name: ace-mysql-ace-core
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ace_db
    ports:
      - "3306:3306"
    networks:
      - "ace-network"
  ace-redis:
    image: redis:6.2-alpine
    container_name: ace-redis-ace-core
    ports:
      - "6379:6379"
    networks:
      - "ace-network"

networks:
  ace-network:
    driver: bridge