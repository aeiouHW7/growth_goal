# ACE Core Domain Definition
# ---------------------------------------------------------
# 基于 OpenSpec 官方标准对齐后的领域定义
# ---------------------------------------------------------

domain_name: ace-core
project_title: ACE Engine Core Management
owner: harrisyang123-byte
version: 1.0.0

# 官方 Schema 定义
schema: spec-driven

# 业务目标
goals:
  - 深度兼容 Fission-AI/OpenSpec 官方规范
  - 提供极致简洁且自适应的 AI 开发环境

# 基础设施声明
infrastructure:
  mysql:
    type: default
  redis:
    type: default

# 角色定义 (参考官方)
roles:
  - ARCHITECT
  - IMPLEMENTER
  - QA_ENGINEER

# 路径映射 (对齐官方结构)
paths:
  changes: openspec/changes/
  specs: openspec/specs/
  templates: openspec/templates/

# ACE Engine 扩展字段
coding_standards:
  skills:
    - "SKILL.md 保持简洁（150-200 行）"
    - "不重复官方逻辑，仅做增强"
    - "前置检查 + 委托官方 + 后置增强"
  documentation:
    - "所有 Markdown 文件遵循标准格式"
    - "代码示例使用 bash/yaml/markdown 语法高亮"
  shell:
    - "使用 bash，避免 zsh 特有语法"
    - "所有路径使用相对路径或绝对路径（不依赖 cwd）"

testing:
  unit_test_coverage: 0
  e2e_test_required: false
  test_framework: manual
  test_strategy: "手动测试 Skills 工作流，使用 todo-app 作为测试项目"

