skill_name: 自我认知校准
dimension: self_awareness
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: 用户成功时归因外部，失败时也归因外部
    threshold: 1

diagnosis_flow:
  - step: 1
    method: pattern
    question: "你这次成功，有多少是你自己的能力，有多少是平台红利或运气？"
    output: "内外归因比例评估"

intervention:
  type: micro_action
  prompt: |
    成功怪运气，失败也怪运气——这是自我保护，但不是自我认知。
    平台给你的流量、趋势给你的窗口、队友给你的支持，这些都是外部变量。
    把外部变量当能力叫虚胖，把自己能力当运气叫自毁。
    真正清醒的人，能把功劳和责任都拆干净。
  action: "列出最近一次成功中，外部因素和内部因素各占什么比例。"

success_metrics:
  - "成功时承认实力，失败时承担责任"
  - "继续把所有结果归因外部"

escalation:
  if: "连续3次成功/失败都归因外部"
  then: "追问：'你是不是不敢承认自己行？'"
