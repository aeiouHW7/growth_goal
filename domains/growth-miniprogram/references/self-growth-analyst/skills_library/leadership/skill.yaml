skill_name: 领导力校准
dimension: leadership
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "我来做"
    threshold: 4
  - type: keyword
    value: "交给别人不放心"
    threshold: 3

diagnosis_flow:
  - step: 1
    method: iceberg
    question: "你团队里的人，有多少是你放手让他们成长的？"
    output: "授权程度评估"

intervention:
  type: micro_action
  prompt: |
    你团队里的人，有多少是你放手让他们成长的？攥得越紧，产出越低。
    事必躬亲不是领导力，是控制欲。真正的领导力是让别人成长、让团队产出更大。
  action: "选一件你通常自己做的事，明确交给团队成员独立完成"

success_metrics:
  - "用户主动下放了具体任务"
  - "团队成员获得独立完成工作的机会"
  - "用户仍然包揽所有工作"

escalation:
  if: "用户连续3次表示'还是我自己做比较快'"
  then: "需要正视控制欲根源：是不信任团队还是害怕失控？放手才能培养真正的领导者"
