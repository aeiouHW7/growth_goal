skill_name: 理财力校准
dimension: financial_literacy
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "省钱"
    threshold: 5
  - type: keyword
    value: "花太多了"
    threshold: 3

diagnosis_flow:
  - step: 1
    method: iceberg
    question: "你现在花的每一块钱，有多少是在投资你的未来？"
    output: "消费结构评估：生存型消费 vs 投资型消费"

intervention:
  type: micro_action
  prompt: |
    省出来的钱不等于赚到的。省钱只能让你不死，但不会让你富。
    你需要关注的是资产结构、现金流和回报率，而不是盯着每一笔开销。
  action: "区分你这个月的消费：哪些是必要支出，哪些是投资自己"

success_metrics:
  - "用户开始关注资产配置"
  - "用户能说出自己的投资方向"
  - "用户仍然只谈省钱"

escalation:
  if: "用户持续只关注省钱而不考虑资产增值"
  then: "提醒：财务天花板往往源于思维局限，需要从'省钱思维'切换到'资产思维'"
