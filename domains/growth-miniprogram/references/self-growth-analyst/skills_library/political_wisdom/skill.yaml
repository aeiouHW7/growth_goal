skill_name: 政治智慧校准
dimension: political_wisdom
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "领导"
    threshold: 5
  - type: keyword
    value: "晋升"
    threshold: 3

diagnosis_flow:
  - step: 1
    method: iceberg
    question: "你公司里，谁实际上决定你的晋升？他想要什么？"
    output: "权力结构认知评估"

intervention:
  type: micro_action
  prompt: |
    说不清这个，你的努力就是盲目の。
    组织里永远有两套权力：明面上的职位权力，和暗地里的影响力。晋升往往由后者决定。
  action: "列出3个对你晋升有决定性影响的人，并分析他们各自的核心诉求"

success_metrics:
  - "用户能清晰列出关键决策者"
  - "用户能分析出关键人的诉求"
  - "用户说不清谁决定自己的晋升"

escalation:
  if: "用户完全无法说出关键权力者"
  then: "提醒：在组织中'迷路'是最危险的，需要尽快摸清权力地图"
