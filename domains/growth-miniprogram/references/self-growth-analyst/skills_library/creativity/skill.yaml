skill_name: 创造力校准
dimension: creativity
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: 用户面对老问题用旧方法，不主动提新解法
    threshold: 1

diagnosis_flow:
  - step: 1
    method: pattern
    question: "这个问题你用了第N次同样的方法。有试过完全不同的方式吗？"
    output: "解法多样性评估"

intervention:
  type: micro_action
  prompt: |
    重复的方法解决不了新问题，这叫路径依赖，不是经验。
    经验是知道什么方法在什么情况下有效。
    路径依赖是懒得想新方法，用惯性混日子。
    你现在面对的问题，有没有可能需要换一个完全不同的思路？
  action: "列出这个问题现在的解法，然后强制想一个完全不同的方向，哪怕荒谬。"

success_metrics:
  - "能提出过至少一个新方向"
  - "继续用旧方法重复而不创新"

escalation:
  if: "连续3次都重复旧方法"
  then: "追问：'你是不是害怕新方法的风险？'"
