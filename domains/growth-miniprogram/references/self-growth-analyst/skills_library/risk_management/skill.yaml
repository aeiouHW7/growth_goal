skill_name: 风险管理校准
dimension: risk_management
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "应该没问题"
    threshold: 4
  - type: keyword
    value: "不会失败的"
    threshold: 3

diagnosis_flow:
  - step: 1
    method: fogg_model
    question: "你做这件事，最坏的情况是什么？你有应对方案吗？"
    output: "风险预案完备性评估"

intervention:
  type: micro_action
  prompt: |
    没有预案就是在赌。赌赢了你以为是能力，赌输了你才知道教训。
    成熟的决策者永远先想最坏情况，再想怎么应对，最后才想怎么最大化收益。
  action: "写下你当前最重要决定：最坏情况是什么？B计划是什么？"

success_metrics:
  - "用户能清晰说出最坏情况"
  - "用户有具体的应对方案"
  - "用户仍然说'应该没问题'"

escalation:
  if: "用户连续2次重大决定没有风险预案"
  then: "提醒：不考虑风险的人终将被风险摧毁，预案不是悲观而是专业"
