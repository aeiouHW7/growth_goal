schema: spec-driven

context: |
  # todo-app — ACE 引擎开发载体

  ## 双重角色
  todo-app 既是业务项目（Todo 应用），也是 ACE 引擎优化的开发载体。
  引擎级变更（agents、hooks、commands、workflow）和业务变更都在此 openspec 下管理。

  ## 技术栈
  - Frontend: React + TypeScript (Vite, port 5173)
  - Backend: Node.js + TypeScript + Express (port 3000)
  - Database: PostgreSQL via Prisma ORM (port 5432)
  - Testing: Vitest, 覆盖率目标 80%

  ## ACE Workflow
  ace-planner → ace-applier → ace-reviewer → ace-archiver → ace-retro
  旁路：ace-investigator（任何时候可用）

  ## 关键文件
  - domain.yaml: 项目单一真相源（技术栈、服务、脚本、规范）
  - docs/wiki/index.md: 知识库导航入口
  - agents/*.md: Agent 定义（在引擎根目录）
  - .claude/skills/ace-*/SKILL.md: Skill 定义（在引擎根目录）

  ## 设计哲学
  - 拿来主义：引用 Matt Pocock skills / ECC 方法论，不重写
  - 以终为始：从用户实际使用旅程出发，倒推需要补什么
  - Adapter Pattern：声明式引用外部 skill，映射到 ACE 结构

rules:
  proposal:
    - "以用户旅程为主线：每个变更必须说清解决了旅程中哪个断点。"
    - "引擎变更必须标注影响范围：哪些 agents/skills 受影响。"
    - "遵循 adapter pattern：引用外部方法论时注明来源，不 copy-paste。"
    - "Risk assessment：识别对现有 workflow 的破坏性影响。"

  design:
    - "DRY 审计：先查 agents/ 和 skills/ 是否已有类似能力。"
    - "方案权衡：至少列出选定方案和一个备选方案。"
    - "检查 domain.yaml 和 CLAUDE.md 是否需要同步更新。"

  tasks:
    - "垂直切片：每个 task 是端到端的可验证增量，不是水平分层。"
    - "每个 task 必须有验证步骤。"
    - "数据库迁移 task 必须包含回滚方案。"
