version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-fse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fse_secret}
      POSTGRES_DB: ${DB_NAME:-fse}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fse-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-fse}:${DB_PASSWORD:-fse_secret}@postgres:5432/${DB_NAME:-fse}
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fse-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    depends_on:
      - backend

volumes:
  pgdata:
