skill_name: 谈判力校准
dimension: negotiation
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "我就要"
    threshold: 3
  - type: keyword
    value: "谈不拢"
    threshold: 3

diagnosis_flow:
  - step: 1
    method: iceberg
    question: "对方表面要的是什么？他真正的利益是什么？"
    output: "立场 vs 利益识别能力评估"

intervention:
  type: micro_action
  prompt: |
    只盯立场谈一辈子也谈不成。
    谈判的核心是利益，不是立场。大多数冲突的表面是立场之争，深层是利益之争。
  action: "分析最近一次谈判：对方的立场是什么？他的核心利益是什么？有没有第三方案？"

success_metrics:
  - "用户能区分立场和利益"
  - "用户提出了第三方案"
  - "用户仍然只坚持自己立场"

escalation:
  if: "用户连续2次谈判失败且只谈立场"
  then: "提醒：立场谈判是零和博弈，利益谈判才能创造双赢"
