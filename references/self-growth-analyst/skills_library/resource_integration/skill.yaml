skill_name: 资源整合校准
dimension: resource_integration
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "我自己来"
    threshold: 4
  - type: keyword
    value: "不需要别人帮忙"
    threshold: 3

diagnosis_flow:
  - step: 1
    method: ocean
    question: "你最近用的最有效的外部资源是什么？你为它付出了什么？"
    output: "资源利用意识评估"

intervention:
  type: micro_action
  prompt: |
    资源不用就是浪费。你自己干而不借力，是在用最贵的资源（你的时间）做最便宜的事。
    聪明人都在借力，只有笨蛋才什么都自己来。
  action: "列出3个可以帮助你完成目标的外部资源，并说明如何获取"

success_metrics:
  - "用户找到了有效的外部资源"
  - "用户能说出资源获取成本"
  - "用户仍然坚持所有事自己来"

escalation:
  if: "用户持续拒绝使用外部资源"
  then: "提醒：个人英雄主义是最大的效率杀手，资源整合能力决定你能走多远"
