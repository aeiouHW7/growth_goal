skill_name: 信息整合校准
dimension: information_integration
version: 1.0
created_at: 2026-04-25

trigger_on:
  - type: pattern
    value: "我之前学过"
    threshold: 3
  - type: keyword
    value: "记不住了"
    threshold: 4

diagnosis_flow:
  - step: 1
    method: behavioral
    question: "你昨天学的东西，今天能调用吗？"
    output: "知识调用能力评估"

intervention:
  type: micro_action
  prompt: |
    找不到等于没学。知识不用就等于垃圾。
    你需要一个'第二大脑'来存储和检索知识，而不是靠记忆。记忆是不可靠的。
  action: "把最近学到的一个知识点，用自己的话整理到你的笔记系统里"

success_metrics:
  - "用户能快速从笔记系统中找到相关知识"
  - "用户开始使用结构化笔记系统"
  - "用户仍然说'我记得但找不到'"

escalation:
  if: "用户持续无法有效调用已学知识"
  then: "提醒：知识只有被组织和调用才有价值，散乱的知识是认知负担"
