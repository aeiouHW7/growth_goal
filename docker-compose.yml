services:
  db:
    image: postgres:15-alpine
    container_name: growth-miniprogram-db
    environment:
      POSTGRES_USER: growthuser
      POSTGRES_PASSWORD: growthpass
      POSTGRES_DB: growth-miniprogram
    ports:
      - "5434:5432"
    volumes:
      - growth-miniprogram-data:/var/lib/postgresql/data

volumes:
  growth-miniprogram-data:
