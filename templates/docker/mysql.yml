services:
  ace-mysql:
    image: mysql:8.0
    container_name: ace-mysql-${DOMAIN_NAME}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-ace_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - ace-network

networks:
  ace-network:
    driver: bridge
