services:
  ace-postgres:
    image: postgres:15-alpine
    container_name: ace-postgres-${DOMAIN_NAME}
    environment:
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ace_db}
      POSTGRES_USER: ${DB_USER:-ace_user}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - ace-network
