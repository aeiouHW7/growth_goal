services:
  ace-mongodb:
    image: mongo:6.0
    container_name: ace-mongodb-${DOMAIN_NAME}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${DB_NAME:-ace_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - ace-network
